<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailun.ru — маркетплейс объявлений Москвы и России</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green-950:#0A2E1C;
    --green-900:#0F3D24;
    --green-700:#167A47;
    --green-600:#1B8F53;
    --green-500:#2FA365;
    --green-100:#E9F6EE;
    --green-50:#F4FBF6;
    --gold:#C9972E;
    --gold-100:#FBF3E1;
    --ink:#122318;
    --ink-soft:#4B5D53;
    --line:#E1EBE4;
    --white:#FFFFFF;
    --radius:16px;
    --radius-sm:10px;
    --shadow:0 8px 24px rgba(15,61,36,.10);
    --shadow-lg:0 20px 50px rgba(10,46,28,.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% -10%, #1a5c39 0%, transparent 55%),
      linear-gradient(160deg,var(--green-950) 0%,var(--green-900) 45%,#0c3220 100%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Manrope',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--gold-100);color:var(--green-900);}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  /* lattice signature texture */
  .lattice{
    position:absolute;inset:0;opacity:.10;pointer-events:none;
    background-image:
      linear-gradient(45deg, var(--white) 1px, transparent 1px),
      linear-gradient(-45deg, var(--white) 1px, transparent 1px);
    background-size:26px 26px;
  }

  .app-shell{
    max-width:480px;margin:0 auto;background:var(--white);
    min-height:100vh;position:relative;box-shadow:var(--shadow-lg);
    overflow:hidden;
  }
  .status-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 20px 6px;font-size:13px;font-weight:600;color:var(--green-950);
    background:var(--white);
  }
  .status-bar .dots{display:flex;gap:3px;align-items:center;}
  .status-bar .bar{width:3px;background:var(--green-950);border-radius:1px;}
  .status-bar .bar:nth-child(1){height:5px;} .status-bar .bar:nth-child(2){height:7px;}
  .status-bar .bar:nth-child(3){height:9px;} .status-bar .bar:nth-child(4){height:11px;}

  /* ---------- Partner banner ---------- */
  .partner-banner{
    background:linear-gradient(120deg,var(--green-900),var(--green-700));
    color:var(--white);padding:10px 16px;display:flex;align-items:center;
    justify-content:space-between;gap:10px;position:relative;overflow:hidden;
  }
  .partner-banner span{font-size:12.5px;font-weight:500;line-height:1.3;position:relative;z-index:1;}
  .partner-banner b{color:var(--gold);}
  .partner-banner button{
    background:var(--gold);color:var(--green-950);border:none;border-radius:999px;
    padding:7px 13px;font-size:12px;font-weight:700;white-space:nowrap;position:relative;z-index:1;
    box-shadow:0 4px 10px rgba(201,151,46,.4);
  }

  /* ---------- Header ---------- */
  header.main{padding:14px 16px 12px;background:var(--white);border-bottom:1px solid var(--line);}
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
  .logo{display:flex;align-items:center;gap:9px;}
  .logo-mark{
    width:36px;height:36px;border-radius:11px;
    background:linear-gradient(145deg,var(--green-600),var(--green-900));
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);
  }
  .logo-mark svg{width:19px;height:19px;}
  .logo-text{font-family:'Manrope',sans-serif;font-weight:700;font-size:19px;color:var(--green-950);letter-spacing:.2px;}
  .auth-actions{display:flex;align-items:center;gap:8px;}
  .btn{
    border:none;border-radius:999px;padding:9px 14px;font-size:13px;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:transform .15s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--green-700);color:var(--white);}
  .btn-primary:hover{background:var(--green-600);}
  .btn-ghost{background:transparent;color:var(--green-700);font-weight:600;padding:9px 8px;}
  .btn-outline{background:var(--white);color:var(--green-900);border:1px solid var(--line);}
  .icon-btn{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--white);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .avatar-btn{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--green-50);
    border-radius:999px;padding:4px 10px 4px 4px;}
  .avatar-circle{width:26px;height:26px;border-radius:50%;background:var(--green-700);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

  .cta-row{display:flex;gap:8px;}
  .search-field{
    flex:1;display:flex;align-items:center;gap:8px;background:var(--green-50);
    border:1px solid var(--line);border-radius:999px;padding:11px 14px;color:var(--ink-soft);font-size:13.5px;
  }
  .search-field svg{flex-shrink:0;}

  /* ---------- Metro search (Moscow) ---------- */
  .metro-search-bar{position:relative;padding:10px 16px 12px;background:var(--white);border-bottom:1px solid var(--line);}
  .metro-input-wrap{
    display:flex;align-items:center;gap:8px;background:var(--green-50);border:1px solid var(--line);
    border-radius:999px;padding:10px 14px;
  }
  .metro-input-wrap svg{flex-shrink:0;}
  .metro-input-wrap input{border:none;background:transparent;outline:none;flex:1;font-size:13.5px;color:var(--ink);}
  .metro-suggestions{
    display:none;position:absolute;left:16px;right:16px;top:56px;background:var(--white);
    border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);z-index:30;overflow:hidden;
  }
  .metro-suggestions.open{display:block;}
  .metro-suggest-item{
    display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:none;
    padding:11px 14px;font-size:13px;font-weight:600;color:var(--green-950);border-bottom:1px solid var(--line);
  }
  .metro-suggest-item:last-child{border-bottom:none;}
  .metro-suggest-item:hover, .metro-suggest-item:active{background:var(--green-50);}
  .metro-empty{padding:12px 14px;font-size:12.5px;color:var(--ink-soft);}
  .metro-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .metro-chips:empty{margin-top:0;}
  .metro-chip{
    display:inline-flex;align-items:center;gap:6px;background:var(--green-700);color:#fff;border-radius:999px;
    padding:7px 8px 7px 12px;font-size:12px;font-weight:600;
  }
  .metro-chip button{
    background:rgba(255,255,255,.22);border:none;color:#fff;width:18px;height:18px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1;flex-shrink:0;
  }

  /* ---------- Category-scoped search ---------- */
  .cat-search-wrap{position:relative;margin:0 0 16px;}
  .cat-search-input-row{
    display:flex;align-items:center;gap:8px;background:var(--green-50);border:1px solid var(--line);
    border-radius:999px;padding:10px 14px;
  }
  .cat-search-input-row svg{flex-shrink:0;}
  .cat-search-input-row input{border:none;background:transparent;outline:none;flex:1;font-size:13.5px;color:var(--ink);font-family:inherit;}
  .cat-search-suggestions{
    display:none;position:absolute;left:0;right:0;top:50px;background:var(--white);
    border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);z-index:30;overflow:hidden;
  }
  .cat-search-suggestions.open{display:block;}
  .cat-search-suggest-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;background:none;border:none;
    padding:11px 14px;font-size:13px;font-weight:600;color:var(--green-950);border-bottom:1px solid var(--line);cursor:pointer;font-family:inherit;
  }
  .cat-search-suggest-item:last-child{border-bottom:none;}
  .cat-search-suggest-item:hover, .cat-search-suggest-item:active{background:var(--green-50);}
  .cat-search-suggest-item .css-name{display:flex;align-items:center;gap:8px;min-width:0;}
  .cat-search-suggest-item .css-sub{font-weight:500;color:var(--ink-soft);font-size:11px;white-space:nowrap;}
  .cat-search-suggest-item .css-price{font-weight:700;color:var(--green-700);font-size:12px;flex-shrink:0;white-space:nowrap;}
  .cat-search-empty{padding:12px 14px;font-size:12.5px;color:var(--ink-soft);}

  .cats-strip{display:flex;gap:8px;padding:6px 16px 2px;overflow-x:auto;background:var(--white);}
  .cats-strip::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--green-50);
    border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--green-900);
  }
  .cat-chip.active{background:var(--green-700);color:#fff;border-color:var(--green-700);}

  main{padding:18px 16px 100px;background:var(--green-50);min-height:60vh;}

  /* ---------- Home: category grid ---------- */
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:4px 0 12px;}
  .section-head h2{font-size:16.5px;margin:0;color:var(--green-950);}
  .section-head .link{font-size:12.5px;font-weight:700;color:var(--green-700);}
  .hero-card{
    position:relative;border-radius:20px;overflow:hidden;padding:22px 18px;margin-bottom:20px;
    background:linear-gradient(135deg,var(--green-900),var(--green-600));color:#fff;
  }
  .hero-card h1{font-size:20px;margin:0 0 6px;line-height:1.25;}
  .hero-card p{margin:0;font-size:13px;color:#dff2e6;line-height:1.5;max-width:80%;}

  .grid-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px;}
  .cat-card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:14px 8px 12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cat-card:active{transform:scale(.96);}
  .cat-card .ico{
    width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;
    background:var(--green-100);
  }
  .cat-card span{font-size:12px;font-weight:600;line-height:1.25;color:var(--green-950);}
  .cat-card small{font-size:10.5px;color:var(--ink-soft);font-weight:500;}
  .cat-card.active{background:var(--green-700);border-color:var(--green-700);}
  .cat-card.active .ico{background:rgba(255,255,255,.2);}
  .cat-card.active span{color:#fff;}

  .promo-row{display:flex;gap:10px;overflow-x:auto;margin-bottom:24px;padding-bottom:2px;}
  .promo-row::-webkit-scrollbar{display:none;}
  .promo-card{
    flex-shrink:0;width:150px;height:96px;border-radius:14px;padding:12px;color:#fff;
    display:flex;flex-direction:column;justify-content:space-between;font-weight:700;font-size:13px;
  }

  /* ---------- Category icon button (header) ---------- */
  .cat-all-icon-btn{
    display:flex;align-items:center;justify-content:center;background:var(--green-700);border:none;
    border-radius:12px;width:40px;height:40px;flex-shrink:0;box-shadow:0 3px 8px rgba(22,122,71,.28);
  }

  /* ---------- Home: feature tiles + quick row ---------- */
  .feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .feature-tile{
    position:relative;border-radius:20px;padding:16px 14px;min-height:104px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;overflow:hidden;text-align:center;
    box-shadow:0 6px 18px rgba(15,61,36,.08);
  }
  .feature-tile .badge-ico{width:52px;height:52px;flex-shrink:0;}
  .feature-tile span.name{font-size:14px;font-weight:800;line-height:1.25;position:relative;z-index:1;
    font-family:'Manrope',sans-serif;letter-spacing:.1px;}
  .feature-tile.tile-a{background:var(--white);border:1px solid var(--line);}
  .feature-tile.tile-a .name{color:var(--green-950);}
  .feature-tile.tile-b{background:linear-gradient(150deg,#1c2a4a,#0d1526);border:1px solid #26365c;}
  .feature-tile.tile-b .name{color:#fff;}

  .quick-row{display:flex;gap:10px;overflow-x:auto;margin-bottom:26px;padding:2px 4px 6px 0;scroll-snap-type:x proximity;}
  .quick-row::-webkit-scrollbar{display:none;}
  .quick-tile{
    flex-shrink:0;width:92px;scroll-snap-align:start;
    background:var(--white);border:1px solid var(--line);border-radius:16px;padding:16px 6px 12px;
    display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;
  }
  .quick-tile .ico{width:52px;height:52px;border-radius:14px;background:var(--green-100);display:flex;
    align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .quick-tile span{
    font-size:11px;font-weight:700;color:var(--green-950);line-height:1.25;
    width:100%;overflow-wrap:break-word;word-break:break-word;hyphens:auto;
  }
  .quick-tile.tile-more .ico{background:var(--green-700);color:#fff;font-size:26px;font-weight:800;}

  /* ---------- Listings grid (Новые объявления) ---------- */
  .listings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .listing-card{background:var(--white);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .listing-media{
    height:78px;position:relative;color:#fff;background-size:cover;background-position:center;
  }
  .listing-body{padding:7px 7px 9px;}
  .listing-price{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px;margin-bottom:3px;}
  .listing-price b{color:var(--green-700);font-size:11px;font-weight:800;}
  .listing-price s{color:#9aa79f;font-size:9.5px;font-weight:600;}
  .listing-desc{font-size:9.5px;color:var(--ink-soft);line-height:1.35;margin:0 0 4px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:26px;}
  .listing-tag{font-size:9px;font-weight:700;color:var(--green-900);margin-bottom:6px;}
  .listing-footer{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--ink-soft);}
  .listing-footer .avatar-circle-sm{
    width:15px;height:15px;border-radius:50%;background:var(--green-700);color:#fff;font-size:7.5px;font-weight:700;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .listing-footer span:nth-child(2){overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .listing-footer .heart{margin-left:auto;cursor:pointer;font-size:11px;}

  /* ---------- Listing rows (subcategory listings, single column) ---------- */
  .listing-row-card{
    display:flex;gap:10px;background:var(--white);border:1px solid var(--line);border-radius:12px;
    overflow:hidden;margin-bottom:10px;padding:8px;
  }
  .listing-row-media{
    width:88px;height:88px;border-radius:10px;flex-shrink:0;background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;
  }
  .listing-row-body{flex:1;min-width:0;padding:2px 2px 2px 0;}
  .listing-row-body h4{font-size:13px;margin:2px 0 5px;font-weight:700;color:var(--green-950);line-height:1.3;}
  .listing-row-actions{margin-left:auto;display:flex;align-items:center;gap:6px;}
  .msg-ico{
    width:24px;height:24px;border-radius:7px;background:var(--green-100);display:inline-flex;
    align-items:center;justify-content:center;font-size:12px;cursor:pointer;flex-shrink:0;
  }

  .pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0 20px;}
  .pagination button{
    width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--white);
    font-size:12px;font-weight:600;color:var(--ink-soft);
  }
  .pagination button.active{background:var(--green-700);color:#fff;border-color:var(--green-700);}
  .pagination button.nav{border:none;background:none;color:var(--green-700);font-size:15px;}

  /* ---------- Provider list (category screen) ---------- */
  .back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .back-btn{
    width:34px;height:34px;border-radius:50%;background:var(--white);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .screen-title{font-size:18px;color:var(--green-950);margin:0;}
  .screen-sub{font-size:12.5px;color:var(--ink-soft);margin:2px 0 0;}

  .subcat-chips{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;}
  .subcat-chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;border:1px solid var(--line);background:var(--white);border-radius:999px;
    padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--green-900);
  }
  .chip.active{background:var(--green-900);color:#fff;border-color:var(--green-900);}

  .provider-card{
    display:flex;align-items:center;gap:14px;background:var(--white);border:none;
    border-radius:20px;padding:14px;margin-bottom:12px;box-shadow:0 6px 18px rgba(15,61,36,.07);
  }
  .provider-thumb{
    width:56px;height:56px;border-radius:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:24px;background:linear-gradient(150deg,var(--green-100),var(--green-50));
  }
  .provider-info{flex:1;min-width:0;}
  .provider-info h3{font-size:15px;margin:0 0 3px;color:var(--green-950);font-weight:700;}
  .provider-info p{font-size:12px;margin:0;color:var(--ink-soft);}
  .provider-meta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-soft);}
  .rating{display:flex;align-items:center;gap:3px;color:var(--gold);font-weight:700;}
  .chev{color:var(--green-700);flex-shrink:0;}

  /* ---------- Category tile grid (2-up 3D squares) ---------- */
  .build-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:8px;}
  .build-tile{
    position:relative;aspect-ratio:1/1;border:none;border-radius:22px;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    color:#fff;overflow:hidden;font-family:inherit;
    background:
      radial-gradient(120% 90% at 22% 14%, rgba(255,255,255,.40), rgba(255,255,255,0) 55%),
      linear-gradient(155deg, rgba(255,255,255,.24), rgba(0,0,0,.22)),
      var(--tc);
    box-shadow:0 12px 24px rgba(10,46,28,.22), inset 0 1px 0 rgba(255,255,255,.45);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .build-tile:active{transform:scale(.96);box-shadow:0 6px 14px rgba(10,46,28,.22);}
  .build-tile::after{
    content:"";position:absolute;inset:0;border-radius:22px;border:1px solid rgba(255,255,255,.28);pointer-events:none;
  }
  .build-ico{
    font-size:46px;line-height:1;filter:drop-shadow(0 6px 8px rgba(0,0,0,.28));
    display:flex;align-items:center;justify-content:center;
  }
  .build-name{
    font-family:'Manrope',sans-serif;font-weight:800;font-size:14.5px;text-align:center;
    line-height:1.2;padding:0 10px;text-shadow:0 1px 3px rgba(0,0,0,.28);letter-spacing:.1px;
  }

  /* ---------- Product grid ---------- */
  .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .product-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;}
  .product-media{
    height:92px;background:var(--green-100);display:flex;align-items:center;justify-content:center;font-size:30px;
    position:relative;
  }
  .fav-btn{
    position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.9);
    border:none;display:flex;align-items:center;justify-content:center;
  }
  .fav-btn.active svg{fill:#E0455A;stroke:#E0455A;}
  .product-body{padding:10px 10px 12px;}
  .product-body h4{font-size:12.5px;margin:0 0 6px;line-height:1.3;font-weight:600;color:var(--green-950);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px;}
  .product-price{font-size:13px;font-weight:800;color:var(--green-700);margin-bottom:8px;}
  .product-body .btn{width:100%;justify-content:center;padding:8px;font-size:12px;}

  /* ---------- Listing detail screen ---------- */
  .detail-media{
    margin:10px -16px 0;height:260px;background:var(--green-100);background-size:cover;background-position:center;
    display:flex;align-items:center;justify-content:center;font-size:40px;
  }

/* ===================== HELPERS ===================== */
function $(sel,root=document){return root.querySelector(sel);}
function $all(sel,root=document){return [...root.querySelectorAll(sel)];}
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer=setTimeout(()=>t.classList.remove('show'),2400);
}
function catById(id){return DATA.find(c=>c.id===id);}
function showScreen(name){
  $all('.screen').forEach(s=>s.classList.remove('active'));
  $(`.screen[data-screen="${name}"]`).classList.add('active');
  const hideSearch = name==='category' || (name==='provider' && state.activeCat!=='realty') || name==='detail';
  $('#appShell').classList.toggle('hide-top-search', hideSearch);
  $('#appShell').scrollIntoView({behavior:'instant',block:'start'});
  window.scrollTo({top:0,behavior:'instant'});
}
function star(){return '★';}
function pseudoCount(seed, min, max){
  let h = 0;
  for(let i=0;i<seed.length;i++){ h = (h*31 + seed.charCodeAt(i)) >>> 0; }
  return min + (h % (max - min));
}
function parsePrice(str){
  const m = String(str).match(/\d[\d\s]*/);
  if(!m) return null;
  return parseInt(m[0].replace(/\s/g,''), 10);
}
function passesPriceFilter(priceStr, catId){
  const f = state.catFilters[catId];
  if(!f) return true;
  const val = parsePrice(priceStr);
  if(val===null) return true;
  if(f.priceFrom && val < Number(f.priceFrom)) return false;
  if(f.priceTo && val > Number(f.priceTo)) return false;
  return true;
}
function applySortFilter(list, catId, getPrice){
  const f = state.catFilters[catId];
  if(!f || !f.sort || f.sort==='default') return list;
  const dir = f.sort==='asc' ? 1 : -1;
  return [...list].sort((a,b)=>{
    const pa = parsePrice(getPrice(a)), pb = parsePrice(getPrice(b));
    if(pa===null && pb===null) return 0;
    if(pa===null) return 1;
    if(pb===null) return -1;
    return (pa-pb)*dir;
  });
}

  openModal(`

    <div class="field-group"><label>Цена до</label><input type="number" id="pfTo" value="${f.priceTo||''}" placeholder="Например: 50000"></div>

      <select id="pfSort">
        <option value="default" ${(!f.sort||f.sort==='default')?'selected':''}>По умолчанию</option>

function translit(str){
  const map={а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'e',ж:'zh',з:'z',и:'i',й:'y',к:'k',л:'l',м:'m',
    н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'h',ц:'ts',ч:'ch',ш:'sh',щ:'sch',ъ:'',ы:'y',
    ь:'',э:'e',ю:'yu',я:'ya'};
  return str.toLowerCase().split('').map(ch=>map[ch]!==undefined?map[ch]:ch).join('');
}
const METRO_LIST = [...new Set(METRO_RAW)].map(name=>({name, tr:translit(name)}));

function renderMetroSuggestions(q){
  const box = $('#metroSuggestions');
  if(!q){ box.innerHTML=''; box.classList.remove('open'); return; }
  const query = q.toLowerCase().trim();
  const matches = METRO_LIST.filter(m=>{
    if(state.selectedMetro.includes(m.name)) return false;
    return m.name.toLowerCase().startsWith(query) || m.tr.startsWith(query);
  }).slice(0,6);
  if(!matches.length){
    box.innerHTML = '<div class="metro-empty">Станция не найдена</div>';
    box.classList.add('open');
    return;
  }
  box.innerHTML = matches.map(m=>`<button class="metro-suggest-item" data-name="${m.name}">🚇 ${m.name}</button>`).join('');
  box.classList.add('open');
  $all('.metro-suggest-item', box).forEach(btn=>btn.onclick=()=>addMetro(btn.dataset.name));
}
function addMetro(name){
  if(!state.selectedMetro.includes(name)) state.selectedMetro.push(name);
  const input = $('#metroInput');
  input.value=''; input.focus();
  renderMetroSuggestions('');
  renderMetroChips();
  toast(`Добавлено: ${name}`);
}
function removeMetro(name){
  state.selectedMetro = state.selectedMetro.filter(n=>n!==name);
  renderMetroChips();
}
function renderMetroChips(){
  const box = $('#metroChips');
  box.innerHTML = state.selectedMetro.map(n=>`<span class="metro-chip">🚇 ${n}<button data-remove="${n}" aria-label="Убрать">✕</button></span>`).join('');
  $all('[data-remove]', box).forEach(b=>b.onclick=()=>removeMetro(b.dataset.remove));
}
function initMetroSearch(){
  const input = $('#metroInput');
  input.addEventListener('input', e=>renderMetroSuggestions(e.target.value));
  input.addEventListener('focus', e=>{ if(e.target.value.trim()) renderMetroSuggestions(e.target.value); });
  document.addEventListener('click', e=>{
    if(!e.target.closest('#metroSearchBar')) $('#metroSuggestions').classList.remove('open');
  });
  renderMetroChips();
}

const photoViewerState = { photos:[], idx:0 };
function openPhotoViewer(photos, startIdx){
  photoViewerState.photos = photos;
  photoViewerState.idx = startIdx || 0;
  renderPhotoViewer();
  $('#photoViewer').classList.add('open');
}
function closePhotoViewer(){ $('#photoViewer').classList.remove('open'); }
function renderPhotoViewer(){
  const {photos, idx} = photoViewerState;
  $('#photoViewerImg').style.backgroundImage = `url('https://picsum.photos/seed/${photos[idx]}/900/900')`;
  $('#photoViewerDots').innerHTML = photos.map((_,i)=>`<span class="${i===idx?'active':''}"></span>`).join('');
}
function photoViewerPrev(){
  photoViewerState.idx = (photoViewerState.idx - 1 + photoViewerState.photos.length) % photoViewerState.photos.length;
  renderPhotoViewer();
}
function photoViewerNext(){
  photoViewerState.idx = (photoViewerState.idx + 1) % photoViewerState.photos.length;
  renderPhotoViewer();
}
$('#photoViewerClose').onclick = closePhotoViewer;
$('#photoViewerPrev').onclick = photoViewerPrev;
$('#photoViewerNext').onclick = photoViewerNext;
$('#photoViewer').addEventListener('click', e=>{ if(e.target.id==='photoViewer') closePhotoViewer(); });
(function(){
  let touchStartX = null;
  const img = $('#photoViewerImg');
  img.addEventListener('touchstart', e=>{ touchStartX = e.touches[0].clientX; });
  img.addEventListener('touchend', e=>{
    if(touchStartX===null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 40){ dx < 0 ? photoViewerNext() : photoViewerPrev(); }
    touchStartX = null;
  });
})();

        <div class="provider-card" data-sub="${s}">
          <div class="provider-thumb">${subIco(s)}</div>
          <div class="provider-info"><h3>${s}</h3>${subDesc(s)?`<p>${subDesc(s)}</p>`:''}</div>
          <svg class="chev" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 6l6 6-6 6"/></svg>
        </div>`).join('')}
    </div>
  `;
  $('#backToHome').onclick=()=>showScreen('home');
  $('#categoryBellBtn').onclick=()=>toast('Демо: уведомлений пока нет');
  $all('#subcatList [data-sub]').forEach(card=>{
    card.onclick=()=>openSubcat(catId, card.dataset.sub);
  });
  showScreen('category');
}
function buildCatSearchIndex(cat){
  const idx = [];
  cat.subcats.forEach(s=>{
    idx.push({kind:'sub', label:s, sub:s});
    if(cat.listings && cat.listings[s]){
      cat.listings[s].forEach(l=>idx.push({kind:'item', label:l.title, price:l.price, sub:s}));
    } else if(cat.catalog && cat.catalog[s]){
      cat.catalog[s].forEach(it=>idx.push({kind:'item', label:it[0], price:it[1], sub:s}));
    }
  });
  return idx;
}
function renderCatSearchSuggestions(cat, query){
  const box = $('#catSearchSuggestions');
  if(!box) return;
  const q = query.trim().toLowerCase();
  if(!q){ box.classList.remove('open'); box.innerHTML=''; return; }
  const matches = buildCatSearchIndex(cat).filter(e=>e.label.toLowerCase().includes(q)).slice(0,8);
  box.innerHTML = matches.length ? matches.map((e,i)=>`
    <button type="button" class="cat-search-suggest-item" data-idx="${i}">
      <span class="css-name">${e.kind==='sub' ? '📂' : ((cat.subIcons&&cat.subIcons[e.sub])||cat.icon)} ${e.label}</span>
      ${e.kind==='item' ? `<span class="css-price">${e.price}</span>` : `<span class="css-sub">${(cat.subDesc&&cat.subDesc[e.sub])||''}</span>`}
    </button>`).join('') : `<div class="cat-search-empty">Ничего не найдено по «${query}»</div>`;
  box.classList.add('open');
  $all('#catSearchSuggestions .cat-search-suggest-item').forEach((btn,i)=>{
    btn.onclick=()=>openSubcat(cat.id, matches[i].sub);
  });
}
function wireCatSearch(cat){
  const input = $('#catSearchInput');
  const box = $('#catSearchSuggestions');
  if(!input) return;
  input.addEventListener('input', e=>renderCatSearchSuggestions(cat, e.target.value));
  input.addEventListener('focus', e=>{ if(e.target.value.trim()) renderCatSearchSuggestions(cat, e.target.value); });
  input.addEventListener('blur', ()=>setTimeout(()=>{ if(box) box.classList.remove('open'); }, 150));
}

function renderProviderScreen(cat, provider){
  const el = $('#screenProvider');
  const heading = provider ? provider.name : `${cat.icon} ${cat.name}`;

    ? `<span class="rating" style="display:inline-flex">${star()} ${provider.rating}</span> · ${provider.meta}`

    $('#providerFiltersBtn').onclick=()=>openProductFiltersModal(cat);
  }

  if(subcatSearch){
    subcatSearch.addEventListener('input', e=>{
      state.subcatQuery = e.target.value;
      renderProviderProducts(cat);
    });
  }
  renderProviderProducts(cat);
}
function renderProviderProducts(cat){
  const subs = state.activeChip==='Все' ? cat.subcats : [state.activeChip];
  if(cat.taxiParks && state.activeChip==='Такси'){
    renderTaxiParks(cat);
    return;
  }
  if(cat.listings){
    renderListingRows(cat, subs);
    return;
  }
  let entries = [];
  subs.forEach(s=>{ (cat.catalog[s]||[]).forEach((it,i)=>entries.push({sub:s,name:it[0],price:it[1],idx:i})); });
  const pq = (state.subcatQuery||'').trim().toLowerCase();
  if(pq) entries = entries.filter(e=>e.name.toLowerCase().includes(pq));
  entries = entries.filter(e=>passesPriceFilter(e.price, cat.id));
  entries = applySortFilter(entries, cat.id, e=>e.price);
  $('#providerProducts').className = 'product-grid';
  $('#providerProducts').innerHTML = entries.length
    ? entries.map(e=>productCard(cat.icon, e.name, e.price, `${cat.id}-${e.sub}-${e.idx}`)).join('')
    : `<p style="grid-column:1/-1;color:var(--ink-soft);font-size:13px;text-align:center;margin-top:10px">Ничего не найдено по вашим фильтрам</p>`;
  bindProductCards();
}
function renderTaxiParks(cat){
  const box = $('#providerProducts');
  box.className = 'grid-cats';
  const tq = (state.subcatQuery||'').trim().toLowerCase();
  const parks = tq ? cat.taxiParks.filter(n=>n.toLowerCase().includes(tq)) : cat.taxiParks;
  box.innerHTML = parks.map(name=>`
    <div class="cat-card" data-contact="${name}">
      <span class="ico">🚕</span>
      <span>${name}</span>
    </div>`).join('');
  $all('#providerProducts .cat-card').forEach(card=>{
    card.onclick=()=>openContactModal(card.dataset.contact);
  });
}
function renderListingRows(cat, subs){
  let rows = [];
  subs.forEach(s=>{
    const items = cat.listings[s];
    if(items){
      items.forEach((l,i)=>rows.push({...l, sub:s, idx:i}));
    } else {
      (cat.catalog[s]||[]).forEach((it,i)=>rows.push({title:it[0], price:it[1], desc:'', old:'', user:'', sub:s, idx:i}));
    }
  });
  rows.forEach(r=>{ r.key = `${cat.id}-${r.sub}-${r.idx}`; });
  const rq = (state.subcatQuery||'').trim().toLowerCase();
  if(rq) rows = rows.filter(r=>(r.title||'').toLowerCase().includes(rq));
  rows = rows.filter(r=>passesPriceFilter(r.price, cat.id));
  rows = applySortFilter(rows, cat.id, r=>r.price);
  const box = $('#providerProducts');
  box.className = 'listing-row-list';
  if(!rows.length){
    box.innerHTML = `<p style="color:var(--ink-soft);font-size:13px;text-align:center;margin-top:10px">Ничего не найдено по вашим фильтрам</p>`;
    return;
  }
  box.innerHTML = rows.map(r=>{
    const fav = state.favorites.has(r.key) ? '❤️' : '🤍';
    const mediaStyle = r.photo ? `style="background-image:url('https://picsum.photos/seed/${r.photo}/200/200')"` : '';
    return `
    <div class="listing-row-card" data-key="${r.key}">
      <div class="listing-row-media" ${mediaStyle}>${r.photo?'':cat.icon}</div>
      <div class="listing-row-body">
        ${r.desc?`<p class="listing-desc">${r.desc}</p>`:''}
        <h4>${r.title}</h4>
        <div class="listing-price"><b>${r.price}</b>${r.old?`<s>${r.old}</s>`:''}</div>
        <div class="listing-footer">
          ${r.user?`<span class="avatar-circle-sm">${r.user[0]}</span><span>${r.user}</span>`:''}
          <span class="listing-row-actions">
            <span class="msg-ico" data-contact="${r.title}">✉️</span>
            <span class="heart" data-fav="${r.key}">${fav}</span>
          </span>
        </div>
      </div>
    </div>`;
  }).join('');
  $all('#providerProducts .listing-row-card').forEach(card=>{
    card.onclick=()=>{
      const found = rows.find(r=>r.key===card.dataset.key);
      if(found) openListingDetail(found, rows.filter(r=>r.key!==found.key), 'provider');
    };
  });
  $all('#providerProducts [data-contact]').forEach(b=>b.onclick=(e)=>{e.stopPropagation(); openContactModal(b.dataset.contact);});
  $all('#providerProducts [data-fav]').forEach(h=>{
    h.onclick=(e)=>{
      e.stopPropagation();
      const key=h.dataset.fav;
      if(state.favorites.has(key)){state.favorites.delete(key); h.textContent='🤍';}
      else {state.favorites.add(key); h.textContent='❤️'; toast('Добавлено в избранное');}
    };
  });
}
function productCard(icon,name,price,key){
  const fav = state.favorites.has(key) ? 'active' : '';
  return `
  <div class="product-card">
    <div class="product-media">${icon}
      <button class="fav-btn ${fav}" data-fav="${key}">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#4B5D53" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      </button>
    </div>
    <div class="product-body">
      <h4>${name}</h4>
      <div class="product-price">${price}</div>
      <button class="btn btn-primary" data-contact="${name}">Написать</button>
    </div>
  </div>`;
}
function bindProductCards(){
  $all('[data-fav]').forEach(b=>{
    b.onclick=(e)=>{
      e.stopPropagation();
      const key=b.dataset.fav;
      if(state.favorites.has(key)){state.favorites.delete(key); b.classList.remove('active');}
      else {state.favorites.add(key); b.classList.add('active'); toast('Добавлено в избранное');}
    };
  });
  $all('[data-contact]').forEach(b=>{
    b.onclick=(e)=>{
      e.stopPropagation();
      openContactModal(b.dataset.contact);
    };
  });
}

function flattenSearchIndex(){
  const idx=[];
  DATA.forEach(c=>{
    idx.push({type:'Категория',icon:c.icon,name:c.name,go:()=>openCategory(c.id)});
    c.providers.forEach((p,i)=>idx.push({type:c.name,icon:c.icon,name:p.name,go:()=>{closeSearch();openProvider(c.id,i);}}));
    Object.entries(c.catalog).forEach(([sub,items])=>items.forEach(it=>{
      idx.push({type:`${c.name} · ${sub}`,icon:c.icon,name:it[0]+' — '+it[1],go:()=>{closeSearch();openCategory(c.id);}});
    }));
  });
  return idx;
}

function renderSearchBody(query){
  const body = $('#searchBody');
  if(!query){
    body.innerHTML = `
      ${state.recent.length? `<div class="section-head" style="margin-top:4px"><h2 style="font-size:14px">Недавние поиски</h2><span class="link" id="clearRecent">Очистить</span></div>

      <div class="section-head" style="margin-top:18px"><h2 style="font-size:14px">Популярные категории</h2></div>
      ${DATA.slice(0,5).map(c=>`

          <div class="ico">${c.icon}</div><div><strong>${c.name}</strong><span>${c.tag}</span></div>
        </div>`).join('')}
    `;
    $('#clearRecent') && ($('#clearRecent').onclick=()=>{state.recent=[]; renderSearchBody('');});
    $all('[data-recent]').forEach(c=>c.onclick=()=>{$('#searchInput').value=c.dataset.recent; renderSearchBody(c.dataset.recent);});
    $all('[data-goto-cat]').forEach(c=>c.onclick=()=>{closeSearch(); openCategory(c.dataset.gotoCat);});
    return;
  }
  const q=query.toLowerCase();
  const results = SEARCH_INDEX.filter(r=>r.name.toLowerCase().includes(q)).slice(0,20);
  body.innerHTML = results.length ? results.map((r,i)=>`
    <div class="search-result-row" data-res="${i}">
      <div class="ico">${r.icon}</div><div><strong>${r.name}</strong><span>${r.type}</span></div>
    </div>`).join('') : `<p style="color:var(--ink-soft);font-size:13px;margin-top:20px;text-align:center">Ничего не найдено по «${query}»</p>`;
  $all('[data-res]').forEach(el=>{
    el.onclick=()=>{
      if(!state.recent.includes(query)){ state.recent.unshift(query); state.recent=state.recent.slice(0,6); }
      results[+el.dataset.res].go();
    };
  });
}

function wireListingMetro(){
  state.listing.metro = null;
  renderListingMetroSelected();
  const input = $('#listingMetroInput');
  input.addEventListener('input', e=>{
    const q = e.target.value.toLowerCase().trim();
    const box = $('#listingMetroSuggestions');
    if(!q){ box.innerHTML=''; return; }
    const matches = METRO_LIST.filter(m=>m.name.toLowerCase().startsWith(q) || m.tr.startsWith(q)).slice(0,5);
    box.innerHTML = matches.length ? matches.map(m=>`
      <div class="search-result-row" data-metro="${m.name}" style="cursor:pointer">
        <div class="ico" style="width:28px;height:28px;font-size:13px">🚇</div><div><strong>${m.name}</strong></div>
      </div>`).join('') : `<p style="color:var(--ink-soft);font-size:12px;padding:8px 4px">Станция не найдена</p>`;
    $all('#listingMetroSuggestions [data-metro]').forEach(row=>{
      row.onclick=()=>{
        state.listing.metro = row.dataset.metro;
        input.value = '';
        box.innerHTML = '';
        renderListingMetroSelected();
      };
    });
  });
}
function renderListingMetroSelected(){
  const el = $('#listingMetroSelected');
  if(!el) return;
  el.innerHTML = state.listing.metro
    ? `<span class="metro-chip">🚇 ${state.listing.metro}<button type="button" id="removeListingMetro">✕</button></span>`
    : '';
  if($('#removeListingMetro')){
    $('#removeListingMetro').onclick=()=>{ state.listing.metro=null; renderListingMetroSelected(); };
  }
}
function wireUploadRow(){
  $all('#uploadRow .upload-box').forEach(box=>{
    const input = box.querySelector('input[type="file"]');
    input.onchange = e=>{
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ()=>{
        box.style.backgroundImage = `url('${reader.result}')`;
        box.classList.add('filled');
        const icon = box.querySelector('.upload-icon');
        if(icon) icon.style.display = 'none';
        if(!box.querySelector('.upload-remove')){
          const rm = document.createElement('button');
          rm.className = 'upload-remove';
          rm.type = 'button';
          rm.textContent = '✕';
          rm.onclick = (e)=>{
            e.preventDefault(); e.stopPropagation();
            box.style.backgroundImage = '';
            box.classList.remove('filled');
            input.value = '';
            if(icon) icon.style.display = '';
            rm.remove();
          };
          box.appendChild(rm);
        }
      };
      reader.readAsDataURL(file);
    };
  });
}

function matchesJobFilters(v){
  const f = state.jobFilters;
  if(f.city!=='Все города' && v.city!==f.city) return false;
  if(f.schedule!=='Любой график' && v.schedule!==f.schedule) return false;
  if(f.experience!=='Любой опыт' && v.experience!==f.experience) return false;
  if(f.salaryFrom && v.salaryTo < Number(f.salaryFrom)) return false;
  if(f.search && f.search.trim()){
    const q = f.search.trim().toLowerCase();
    if(!v.title.toLowerCase().includes(q) && !v.company.toLowerCase().includes(q)) return false;
  }
  return true;
}

function renderJobSearchSuggestions(cat, query){
  const box = $('#jobSearchSuggestions');
  if(!box) return;
  const q = query.trim().toLowerCase();
  if(!q){ box.classList.remove('open'); box.innerHTML=''; return; }
  const matches = VACANCIES.filter(v=>v.title.toLowerCase().includes(q) || v.company.toLowerCase().includes(q)).slice(0,8);
  box.innerHTML = matches.length ? matches.map((v,i)=>`
    <button type="button" class="cat-search-suggest-item" data-idx="${i}">
      <span class="css-name">💼 ${v.title} <span class="css-sub">· ${v.company}</span></span>
      <span class="css-price">${money(v.salaryFrom)}–${money(v.salaryTo)} ${v.currency||'₽'}</span>
    </button>`).join('') : `<div class="cat-search-empty">Ничего не найдено по «${query}»</div>`;
  box.classList.add('open');
  $all('#jobSearchSuggestions .cat-search-suggest-item').forEach((btn,i)=>{
    btn.onclick=()=>openVacancyDetail(matches[i].id, cat);
  });
}
function wireJobSearch(cat){
  const input = $('#jobSearchInput');
  const box = $('#jobSearchSuggestions');
  if(!input) return;
  input.addEventListener('input', e=>{
    state.jobFilters.search = e.target.value;
    renderJobSearchSuggestions(cat, e.target.value);
    renderVacancyList(cat);
  });
  input.addEventListener('focus', e=>{ if(e.target.value.trim()) renderJobSearchSuggestions(cat, e.target.value); });
  input.addEventListener('blur', ()=>setTimeout(()=>{ if(box) box.classList.remove('open'); }, 150));
}
function renderVacancyList(cat){
  const list = VACANCIES.filter(matchesJobFilters);
  $('#vacancyList').innerHTML = list.length
    ? list.map(vacancyCard).join('')
    : `<p style="color:var(--ink-soft);font-size:13px;text-align:center;margin-top:20px">Ничего не найдено по вашим фильтрам</p>`;
  $all('#vacancyList [data-vac]').forEach(c=>{
    c.onclick=(e)=>{ if(e.target.closest('[data-fav]')) return; openVacancyDetail(+c.dataset.vac, cat); };
  });
  $all('#vacancyList [data-fav]').forEach(h=>{
    h.onclick=(e)=>{
      e.stopPropagation();
      const key=h.dataset.fav;
      if(state.favorites.has(key)){state.favorites.delete(key); h.textContent='🤍';}
      else {state.favorites.add(key); h.textContent='❤️'; toast('Добавлено в избранное');}
    };
  });
}

/* ---- Chat (employer <-> candidate demo) ---- */
function openChat(personName){
  if(!state.chats[personName]){
    state.chats[personName] = [
      {from:'them', text:'Здравствуйте! Спасибо за интерес, расскажите немного о себе.'},
      {from:'me', text:'Добрый день! Готов(а) обсудить детали и пройти собеседование.'}
    ];
  }
  openModal(`
    <div class="modal-head"><h3>💬 ${personName}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="chatMessages" style="max-height:300px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;gap:8px"></div>
    <div style="display:flex;gap:8px">
      <input type="text" id="chatInput" placeholder="Написать сообщение..." style="flex:1;border:1px solid var(--line);border-radius:11px;padding:10px 12px;font-size:13px;background:var(--green-50)">
      <button class="btn btn-primary" id="chatSendBtn">➤</button>
    </div>
  `);
  renderChatMessages(personName);
  $('#chatSendBtn').onclick=()=>{
    const val = $('#chatInput').value.trim();
    if(!val) return;
    state.chats[personName].push({from:'me', text:val});
    $('#chatInput').value='';
    renderChatMessages(personName);
    setTimeout(()=>{
      state.chats[personName].push({from:'them', text:'Спасибо, я передам информацию дальше.'});
      renderChatMessages(personName);
    }, 900);
  };
}
function renderChatMessages(personName){
  const box = $('#chatMessages');
  if(!box) return;
  box.innerHTML = state.chats[personName].map(m=>`
    <div style="align-self:${m.from==='me'?'flex-end':'flex-start'};background:${m.from==='me'?'var(--green-700)':'var(--green-50)'};color:${m.from==='me'?'#fff':'var(--ink)'};padding:9px 13px;border-radius:14px;max-width:80%;font-size:13px">${m.text}</div>
  `).join('');
  box.scrollTop = box.scrollHeight;
}

/* ---- Monetization: boosts + employer subscriptions ---- */

}
