<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ailun.ru — маркетплейс объявлений ОАЭ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --green-950:#0A2E1C;
    --green-900:#0F3D24;
    --green-700:#167A47;
    --green-600:#1B8F53;
    --green-500:#2FA365;
    --green-100:#E9F6EE;
    --green-50:#F4FBF6;
    --gold:#C9972E;
    --gold-100:#FBF3E1;
    --ink:#122318;
    --ink-soft:#4B5D53;
    --line:#E1EBE4;
    --white:#FFFFFF;
    --radius:16px;
    --radius-sm:10px;
    --shadow:0 8px 24px rgba(15,61,36,.10);
    --shadow-lg:0 20px 50px rgba(10,46,28,.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(circle at 20% -10%, #1a5c39 0%, transparent 55%),
      linear-gradient(160deg,var(--green-950) 0%,var(--green-900) 45%,#0c3220 100%);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{font-family:'Unbounded',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  a{color:inherit;text-decoration:none;}
  ::selection{background:var(--gold-100);color:var(--green-900);}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  /* lattice signature texture */
  .lattice{
    position:absolute;inset:0;opacity:.10;pointer-events:none;
    background-image:
      linear-gradient(45deg, var(--white) 1px, transparent 1px),
      linear-gradient(-45deg, var(--white) 1px, transparent 1px);
    background-size:26px 26px;
  }

  .app-shell{
    max-width:480px;margin:0 auto;background:var(--white);
    min-height:100vh;position:relative;box-shadow:var(--shadow-lg);
    overflow:hidden;
  }
  .status-bar{
    display:flex;justify-content:space-between;align-items:center;
    padding:10px 20px 6px;font-size:13px;font-weight:600;color:var(--green-950);
    background:var(--white);
  }
  .status-bar .dots{display:flex;gap:3px;align-items:center;}
  .status-bar .bar{width:3px;background:var(--green-950);border-radius:1px;}
  .status-bar .bar:nth-child(1){height:5px;} .status-bar .bar:nth-child(2){height:7px;}
  .status-bar .bar:nth-child(3){height:9px;} .status-bar .bar:nth-child(4){height:11px;}

  /* ---------- Partner banner ---------- */
  .partner-banner{
    background:linear-gradient(120deg,var(--green-900),var(--green-700));
    color:var(--white);padding:10px 16px;display:flex;align-items:center;
    justify-content:space-between;gap:10px;position:relative;overflow:hidden;
  }
  .partner-banner span{font-size:12.5px;font-weight:500;line-height:1.3;position:relative;z-index:1;}
  .partner-banner b{color:var(--gold);}
  .partner-banner button{
    background:var(--gold);color:var(--green-950);border:none;border-radius:999px;
    padding:7px 13px;font-size:12px;font-weight:700;white-space:nowrap;position:relative;z-index:1;
    box-shadow:0 4px 10px rgba(201,151,46,.4);
  }

  /* ---------- Header ---------- */
  header.main{padding:14px 16px 12px;background:var(--white);border-bottom:1px solid var(--line);}
  .top-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;}
  .logo{display:flex;align-items:center;gap:9px;}
  .logo-mark{
    width:36px;height:36px;border-radius:11px;
    background:linear-gradient(145deg,var(--green-600),var(--green-900));
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);
  }
  .logo-mark svg{width:19px;height:19px;}
  .logo-text{font-family:'Unbounded',sans-serif;font-weight:700;font-size:19px;color:var(--green-950);letter-spacing:.2px;}
  .auth-actions{display:flex;align-items:center;gap:8px;}
  .btn{
    border:none;border-radius:999px;padding:9px 14px;font-size:13px;font-weight:700;
    display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:transform .15s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--green-700);color:var(--white);}
  .btn-primary:hover{background:var(--green-600);}
  .btn-ghost{background:transparent;color:var(--green-700);font-weight:600;padding:9px 8px;}
  .btn-outline{background:var(--white);color:var(--green-900);border:1px solid var(--line);}
  .icon-btn{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--white);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .avatar-btn{display:flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--green-50);
    border-radius:999px;padding:4px 10px 4px 4px;}
  .avatar-circle{width:26px;height:26px;border-radius:50%;background:var(--green-700);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

  .cta-row{display:flex;gap:8px;}
  .search-field{
    flex:1;display:flex;align-items:center;gap:8px;background:var(--green-50);
    border:1px solid var(--line);border-radius:999px;padding:11px 14px;color:var(--ink-soft);font-size:13.5px;
  }
  .search-field svg{flex-shrink:0;}

  .cats-strip{display:flex;gap:8px;padding:6px 16px 2px;overflow-x:auto;background:var(--white);}
  .cats-strip::-webkit-scrollbar{display:none;}
  .cat-chip{
    flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--green-50);
    border:1px solid var(--line);border-radius:999px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--green-900);
  }
  .cat-chip.active{background:var(--green-700);color:#fff;border-color:var(--green-700);}

  main{padding:18px 16px 100px;background:var(--green-50);min-height:60vh;}

  /* ---------- Home: category grid ---------- */
  .section-head{display:flex;align-items:baseline;justify-content:space-between;margin:4px 0 12px;}
  .section-head h2{font-size:16.5px;margin:0;color:var(--green-950);}
  .section-head .link{font-size:12.5px;font-weight:700;color:var(--green-700);}
  .hero-card{
    position:relative;border-radius:20px;overflow:hidden;padding:22px 18px;margin-bottom:20px;
    background:linear-gradient(135deg,var(--green-900),var(--green-600));color:#fff;
  }
  .hero-card h1{font-size:20px;margin:0 0 6px;line-height:1.25;}
  .hero-card p{margin:0;font-size:13px;color:#dff2e6;line-height:1.5;max-width:80%;}

  .grid-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px;}
  .cat-card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius-sm);
    padding:14px 8px 12px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .cat-card:active{transform:scale(.96);}
  .cat-card .ico{
    width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;
    background:var(--green-100);
  }
  .cat-card span{font-size:12px;font-weight:600;line-height:1.25;color:var(--green-950);}
  .cat-card small{font-size:10.5px;color:var(--ink-soft);font-weight:500;}

  .promo-row{display:flex;gap:10px;overflow-x:auto;margin-bottom:24px;padding-bottom:2px;}
  .promo-row::-webkit-scrollbar{display:none;}
  .promo-card{
    flex-shrink:0;width:150px;height:96px;border-radius:14px;padding:12px;color:#fff;
    display:flex;flex-direction:column;justify-content:space-between;font-weight:700;font-size:13px;
  }

  /* ---------- Category pill (header) ---------- */
  .cat-all-pill{
    display:flex;align-items:center;gap:4px;background:var(--green-700);border:1px solid var(--green-700);
    border-radius:999px;padding:8px 9px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;flex-shrink:0;
    box-shadow:0 3px 8px rgba(22,122,71,.28);
  }
  .cat-all-pill svg{width:11px;height:11px;flex-shrink:0;}

  /* ---------- Home: feature tiles + quick row ---------- */
  .feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .feature-tile{
    position:relative;border-radius:20px;padding:16px 14px;min-height:104px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:10px;overflow:hidden;text-align:center;
    box-shadow:0 6px 18px rgba(15,61,36,.08);
  }
  .feature-tile .badge-ico{width:52px;height:52px;flex-shrink:0;}
  .feature-tile span.name{font-size:14px;font-weight:800;line-height:1.25;position:relative;z-index:1;
    font-family:'Unbounded',sans-serif;letter-spacing:.1px;}
  .feature-tile.tile-a{background:var(--white);border:1px solid var(--line);}
  .feature-tile.tile-a .name{color:var(--green-950);}
  .feature-tile.tile-b{background:linear-gradient(150deg,#1c2a4a,#0d1526);border:1px solid #26365c;}
  .feature-tile.tile-b .name{color:#fff;}

  .quick-row{display:flex;gap:10px;overflow-x:auto;margin-bottom:26px;padding:2px 4px 6px 0;scroll-snap-type:x proximity;}
  .quick-row::-webkit-scrollbar{display:none;}
  .quick-tile{
    flex-shrink:0;width:92px;scroll-snap-align:start;
    background:var(--white);border:1px solid var(--line);border-radius:16px;padding:16px 6px 12px;
    display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;
  }
  .quick-tile .ico{width:52px;height:52px;border-radius:14px;background:var(--green-100);display:flex;
    align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
  .quick-tile span{
    font-size:11px;font-weight:700;color:var(--green-950);line-height:1.25;
    width:100%;overflow-wrap:break-word;word-break:break-word;hyphens:auto;
  }
  .quick-tile.tile-more .ico{background:var(--green-700);color:#fff;font-size:26px;font-weight:800;}

  /* ---------- Listings grid (Новые объявления) ---------- */
  .listings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .listing-card{background:var(--white);border:1px solid var(--line);border-radius:12px;overflow:hidden;}
  .listing-media{
    height:78px;position:relative;color:#fff;background-size:cover;background-position:center;
  }
  .listing-body{padding:7px 7px 9px;}
  .listing-price{display:flex;flex-wrap:wrap;align-items:baseline;gap:4px;margin-bottom:3px;}
  .listing-price b{color:var(--green-700);font-size:11px;font-weight:800;}
  .listing-price s{color:#9aa79f;font-size:9.5px;font-weight:600;}
  .listing-desc{font-size:9.5px;color:var(--ink-soft);line-height:1.35;margin:0 0 4px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:26px;}
  .listing-tag{font-size:9px;font-weight:700;color:var(--green-900);margin-bottom:6px;}
  .listing-footer{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--ink-soft);}
  .listing-footer .avatar-circle-sm{
    width:15px;height:15px;border-radius:50%;background:var(--green-700);color:#fff;font-size:7.5px;font-weight:700;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .listing-footer span:nth-child(2){overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .listing-footer .heart{margin-left:auto;cursor:pointer;font-size:11px;}

  .pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0 20px;}
  .pagination button{
    width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--white);
    font-size:12px;font-weight:600;color:var(--ink-soft);
  }
  .pagination button.active{background:var(--green-700);color:#fff;border-color:var(--green-700);}
  .pagination button.nav{border:none;background:none;color:var(--green-700);font-size:15px;}

  /* ---------- Provider list (category screen) ---------- */
  .back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .back-btn{
    width:34px;height:34px;border-radius:50%;background:var(--white);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .screen-title{font-size:18px;color:var(--green-950);margin:0;}
  .screen-sub{font-size:12.5px;color:var(--ink-soft);margin:2px 0 0;}

  .subcat-chips{display:flex;gap:8px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px;}
  .subcat-chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;border:1px solid var(--line);background:var(--white);border-radius:999px;
    padding:8px 13px;font-size:12.5px;font-weight:600;color:var(--green-900);
  }
  .chip.active{background:var(--green-900);color:#fff;border-color:var(--green-900);}

  .provider-card{
    display:flex;align-items:center;gap:12px;background:var(--white);border:1px solid var(--line);
    border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;
  }
  .provider-thumb{
    width:52px;height:52px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    font-size:22px;background:var(--green-100);
  }
  .provider-info{flex:1;min-width:0;}
  .provider-info h3{font-size:14px;margin:0 0 3px;color:var(--green-950);}
  .provider-meta{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-soft);}
  .rating{display:flex;align-items:center;gap:3px;color:var(--gold);font-weight:700;}
  .chev{color:var(--ink-soft);flex-shrink:0;}

  /* ---------- Product grid ---------- */
  .product-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .product-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-sm);overflow:hidden;}
  .product-media{
    height:92px;background:var(--green-100);display:flex;align-items:center;justify-content:center;font-size:30px;
    position:relative;
  }
  .fav-btn{
    position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.9);
    border:none;display:flex;align-items:center;justify-content:center;
  }
  .fav-btn.active svg{fill:#E0455A;stroke:#E0455A;}
  .product-body{padding:10px 10px 12px;}
  .product-body h4{font-size:12.5px;margin:0 0 6px;line-height:1.3;font-weight:600;color:var(--green-950);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:32px;}
  .product-price{font-size:13px;font-weight:800;color:var(--green-700);margin-bottom:8px;}
  .product-body .btn{width:100%;justify-content:center;padding:8px;font-size:12px;}

  /* ---------- Bottom nav ---------- */
  .bottom-nav{
    position:sticky;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--line);
    display:flex;justify-content:space-around;padding:9px 6px 12px;z-index:20;
  }
  .nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:600;color:var(--ink-soft);
    background:none;border:none;padding:4px 8px;}
  .nav-item.active{color:var(--green-700);}

  /* ---------- Mini footer (light, compact) ---------- */
  .mini-footer{padding:18px 20px 24px;text-align:center;border-top:1px solid var(--line);background:var(--white);}
  .mini-wa{
    display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--green-900);
    background:var(--green-50);border:1px solid var(--line);border-radius:999px;padding:9px 16px;margin-bottom:14px;
  }
  .mini-footer-links{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
  .mini-footer-links button{background:none;border:none;color:var(--ink-soft);font-size:11px;text-decoration:underline;padding:0;}
  .mini-footer-dev{font-size:11px;color:var(--ink-soft);margin:0 0 4px;}
  .mini-footer-copy{font-size:10px;color:#9aa79f;margin:0;}
  .mini-admin-link{
    display:inline-block;margin-top:14px;background:none;border:1px dashed var(--line);border-radius:999px;
    padding:6px 12px;font-size:10.5px;color:var(--ink-soft);
  }

  /* ---------- Super Admin panel (demo) ---------- */
  .admin-header{
    background:linear-gradient(135deg,var(--green-950),var(--green-700));
    color:#fff;padding:20px 16px 22px;margin:-18px -16px 18px;border-radius:0 0 20px 20px;
  }
  .admin-header h2{font-size:17px;margin:0 0 2px;}
  .admin-header p{font-size:12px;color:#bcd8c8;margin:0 0 16px;}
  .admin-stats{display:flex;gap:10px;}
  .admin-stat{flex:1;background:rgba(255,255,255,.08);border-radius:12px;padding:10px 12px;}
  .admin-stat b{display:block;font-size:18px;font-family:'Unbounded',sans-serif;}
  .admin-stat span{font-size:10.5px;color:#bcd8c8;}
  .admin-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;}
  .admin-toolbar h3{font-size:14px;margin:0;color:var(--green-950);}
  .admin-vendor-row{
    display:flex;align-items:center;gap:10px;background:var(--white);border:1px solid var(--line);
    border-radius:12px;padding:11px 12px;margin-bottom:9px;
  }
  .admin-vendor-ico{width:40px;height:40px;border-radius:10px;background:var(--green-100);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:18px;}
  .admin-vendor-info{flex:1;min-width:0;}
  .admin-vendor-info strong{display:block;font-size:12.5px;color:var(--green-950);}
  .admin-vendor-info span{font-size:10.5px;color:var(--ink-soft);}
  .admin-status{font-size:9.5px;font-weight:700;padding:3px 8px;border-radius:999px;white-space:nowrap;}
  .admin-status.active{background:var(--green-100);color:var(--green-700);}
  .admin-status.blocked{background:#fbe9e9;color:#c0392b;}
  .admin-dots{background:none;border:none;color:var(--ink-soft);font-size:16px;padding:4px 6px;flex-shrink:0;}
  .cred-box{
    background:var(--green-50);border:1px dashed var(--green-500);border-radius:12px;padding:12px 14px;margin:12px 0;
  }
  .cred-row{display:flex;justify-content:space-between;align-items:center;font-size:12.5px;padding:5px 0;}
  .cred-row b{color:var(--green-950);font-family:monospace;font-size:13px;}
  .cred-row button{background:none;border:none;color:var(--green-700);font-size:11px;font-weight:700;}

  /* ---------- Search overlay ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(10,46,28,.55);z-index:100;display:none;
    align-items:flex-start;justify-content:center;
  }
  .overlay.open{display:flex;}
  .overlay-panel{
    width:100%;max-width:480px;background:var(--white);min-height:100vh;padding:14px 16px 30px;
    animation:slideDown .2s ease;
  }
  @keyframes slideDown{from{transform:translateY(-14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .overlay-top{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .overlay-top .search-field{background:var(--green-50);}
  .overlay-top input{border:none;background:transparent;outline:none;flex:1;font-size:13.5px;color:var(--ink);}
  .search-result-row{display:flex;align-items:center;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line);}
  .search-result-row .ico{width:32px;height:32px;border-radius:9px;background:var(--green-100);display:flex;
    align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .search-result-row div strong{display:block;font-size:13px;color:var(--green-950);}
  .search-result-row div span{font-size:11px;color:var(--ink-soft);}
  .recent-chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}

  /* ---------- Modal (bottom sheet) ---------- */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(10,46,28,.55);z-index:200;display:none;
    align-items:flex-end;justify-content:center;
  }
  .modal-overlay.open{display:flex;}
  .modal-sheet{
    width:100%;max-width:480px;background:var(--white);border-radius:22px 22px 0 0;
    max-height:88vh;overflow-y:auto;padding:18px 18px 26px;animation:slideUp .22s ease;
  }
  @keyframes slideUp{from{transform:translateY(30px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-handle{width:38px;height:4px;background:var(--line);border-radius:3px;margin:0 auto 14px;}
  .modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .modal-head h3{font-size:16px;margin:0;color:var(--green-950);}
  .modal-close{width:30px;height:30px;border-radius:50%;background:var(--green-50);border:none;
    display:flex;align-items:center;justify-content:center;}
  .field-group{margin-bottom:14px;}
  .field-group label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;}
  .field-group input, .field-group select, .field-group textarea{
    width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:13.5px;

  const fav = state.favorites.has(key) ? 'active' : '';

function bindProductCards(){

function flattenSearchIndex(){
  const idx=[];
  DATA.forEach(c=>{
    idx.push({type:'Категория',icon:c.icon,name:c.name,go:()=>openCategory(c.id)});
    c.providers.forEach((p,i)=>idx.push({type:c.name,icon:c.icon,name:p.name,go:()=>{closeSearch();openProvider(c.id,i);}}));
    Object.entries(c.catalog).forEach(([sub,items])=>items.forEach(it=>{
      idx.push({type:`${c.name} · ${sub}`,icon:c.icon,name:it[0]+' — '+it[1],go:()=>{closeSearch();openCategory(c.id);}});
    }));
  });
  return idx;
}
const SEARCH_INDEX = flattenSearchIndex();
function openSearch(){
  $('#searchOverlay').classList.add('open');
  $('#searchInput').value='';
  $('#searchInput').focus();
  renderSearchBody('');
}
function closeSearch(){ $('#searchOverlay').classList.remove('open'); }
function renderSearchBody(query){
  const body = $('#searchBody');
  if(!query){
    body.innerHTML = `
      ${state.recent.length? `<div class="section-head" style="margin-top:4px"><h2 style="font-size:14px">Недавние поиски</h2><span class="link" id="clearRecent">Очистить</span></div>
      <div class="recent-chip-row">${state.recent.map(r=>`<span class="chip" data-recent="${r}">${r}</span>`).join('')}</div>` : ''}
      <div class="section-head" style="margin-top:18px"><h2 style="font-size:14px">Популярные категории</h2></div>
      ${DATA.slice(0,5).map(c=>`
        <div class="search-result-row" data-goto-cat="${c.id}">
          <div class="ico">${c.icon}</div><div><strong>${c.name}</strong><span>${c.tag}</span></div>
        </div>`).join('')}
    `;
    $('#clearRecent') && ($('#clearRecent').onclick=()=>{state.recent=[]; renderSearchBody('');});
    $all('[data-recent]').forEach(c=>c.onclick=()=>{$('#searchInput').value=c.dataset.recent; renderSearchBody(c.dataset.recent);});
    $all('[data-goto-cat]').forEach(c=>c.onclick=()=>{closeSearch(); openCategory(c.dataset.gotoCat);});
    return;
  }
  const q=query.toLowerCase();
  const results = SEARCH_INDEX.filter(r=>r.name.toLowerCase().includes(q)).slice(0,20);
  body.innerHTML = results.length ? results.map((r,i)=>`
    <div class="search-result-row" data-res="${i}">
      <div class="ico">${r.icon}</div><div><strong>${r.name}</strong><span>${r.type}</span></div>
    </div>`).join('') : `<p style="color:var(--ink-soft);font-size:13px;margin-top:20px;text-align:center">Ничего не найдено по «${query}»</p>`;
  $all('[data-res]').forEach(el=>{
    el.onclick=()=>{
      if(!state.recent.includes(query)){ state.recent.unshift(query); state.recent=state.recent.slice(0,6); }
      results[+el.dataset.res].go();
    };
  });
}

$all('.nav-item').forEach(b=>{
  b.onclick=()=>{
    $all('.nav-item').forEach(n=>n.classList.remove('active'));
    b.classList.add('active');
    const key=b.dataset.nav;
    if(key==='home') showScreen('home');
    else if(key==='search') openSearch();
    else if(key==='add') state.loggedIn ? openListingModal() : openLoginModal();
    else if(key==='fav') toast(state.favorites.size? `У вас ${state.favorites.size} избранных товаров`:'Пока нет избранных товаров');
    else if(key==='profile') state.loggedIn ? openProfileModal() : openLoginModal();
  };
});

/* ===================== SUPER ADMIN PANEL (demo) ===================== */
function randomPass(len=8){
  const chars='ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let out=''; for(let i=0;i<len;i++) out+=chars[Math.floor(Math.random()*chars.length)];
  return out;
}
function sluglogin(name){
  return name.toLowerCase().replace(/[^a-zа-яё0-9]+/gi,'').slice(0,10) || 'vendor';
}
let ADMIN_VENDORS = [];
DATA.forEach(c=>c.providers.forEach(p=>{
  ADMIN_VENDORS.push({name:p.name, catId:c.id, login:sluglogin(p.name), password:randomPass(), status:'active', maxLink:''});
}));

function openAdminPanel(){
  renderAdminScreen();
  showScreen('admin');
}
$('#openAdminBtn').onclick = openAdminPanel;

function renderAdminScreen(){
  const el = $('#screenAdmin');
  const activeCount = ADMIN_VENDORS.filter(v=>v.status==='active').length;
  el.innerHTML = `
    <div class="admin-header">
      <h2>👑 Супер-админ панель</h2>
      <p>Управление вендорами Ailun.ru</p>
      <div class="admin-stats">
        <div class="admin-stat"><b>${ADMIN_VENDORS.length}</b><span>всего вендоров</span></div>
        <div class="admin-stat"><b>${activeCount}</b><span>активных</span></div>
        <div class="admin-stat"><b>${DATA.length}</b><span>категорий</span></div>
      </div>
    </div>
    <div class="back-row" style="margin-top:-6px">
      <button class="back-btn" id="backFromAdmin"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0F3D24" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>
      <p class="screen-sub">Выход из демо-режима администратора</p>
    </div>
    <div class="admin-toolbar">
      <h3>Вендоры (${ADMIN_VENDORS.length})</h3>
      <button class="btn btn-primary" id="addVendorBtn">+ Добавить вендора</button>
    </div>
    <div id="adminVendorList"></div>
  `;
  $('#backFromAdmin').onclick=()=>showScreen('home');
  $('#addVendorBtn').onclick=openAddVendorModal;
  renderAdminVendorList();
}
function renderAdminVendorList(){
  $('#adminVendorList').innerHTML = ADMIN_VENDORS.map((v,i)=>{
    const cat = catById(v.catId) || {icon:'🏪',name:'Без категории'};
    return `
    <div class="admin-vendor-row">
      <div class="admin-vendor-ico">${cat.icon}</div>
      <div class="admin-vendor-info">
        <strong>${v.name}</strong>
        <span>${cat.name} · логин: ${v.login}</span>
      </div>
      <span class="admin-status ${v.status==='active'?'active':'blocked'}">${v.status==='active'?'Активен':'Заблокирован'}</span>
      <button class="admin-dots" data-idx="${i}">⋮</button>
    </div>`;
  }).join('');
  $all('.admin-dots').forEach(b=>b.onclick=()=>openVendorActionsModal(+b.dataset.idx));
}
function openVendorActionsModal(idx){
  const v = ADMIN_VENDORS[idx];
  const cat = catById(v.catId) || {icon:'🏪',name:'Без категории'};
  openModal(`
    <div class="modal-head"><h3>${cat.icon} ${v.name}</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="cred-box">
      <div class="cred-row"><span>Логин</span><b>${v.login}</b></div>
      <div class="cred-row"><span>Пароль</span><b>${v.password}</b></div>
    </div>
    <div class="subcat-list">
      <button onclick="resetVendorPassword(${idx})"><span>🔄 Сбросить пароль</span> ›</button>
      <button onclick="toggleVendorStatus(${idx})"><span>${v.status==='active'?'🚫 Заблокировать':'✅ Активировать'}</span> ›</button>
    </div>
  `);
}
function resetVendorPassword(idx){
  ADMIN_VENDORS[idx].password = randomPass();
  closeModal(); toast(`Новый пароль для ${ADMIN_VENDORS[idx].name}: ${ADMIN_VENDORS[idx].password}`);
  renderAdminVendorList();
}
function toggleVendorStatus(idx){
  ADMIN_VENDORS[idx].status = ADMIN_VENDORS[idx].status==='active' ? 'blocked' : 'active';
  closeModal(); renderAdminScreen();
  toast('Статус вендора обновлён');
}
function openAddVendorModal(){
  openModal(`
    <div class="modal-head"><h3>Новый вендор</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="field-group"><label>Название бренда*</label><input type="text" id="nvName" placeholder="Например: Crispy King"></div>
    <div class="field-group"><label>Категория*</label>
      <select id="nvCat">${DATA.map(c=>`<option value="${c.id}">${c.icon} ${c.name}</option>`).join('')}</select>
    </div>
    <div class="field-group"><label>Ссылка MAX (необязательно сейчас)</label><input type="text" id="nvMax" placeholder="max.ru/u/..."></div>
    <div class="field-group"><label>Логин (создастся автоматически)</label><input type="text" id="nvLogin" placeholder="сгенерируется из названия" readonly></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" id="createVendorBtn">Создать вендора и получить доступ</button>
  `);
  $('#nvName').addEventListener('input', e=>{ $('#nvLogin').value = sluglogin(e.target.value); });
  $('#createVendorBtn').onclick=()=>{
    const name = $('#nvName').value.trim();
    if(!name){ toast('Укажите название бренда'); return; }
    const vendor = {
      name, catId:$('#nvCat').value, login:sluglogin(name)||('vendor'+(ADMIN_VENDORS.length+1)),
      password:randomPass(), status:'active', maxLink:$('#nvMax').value.trim()
    };
    ADMIN_VENDORS.push(vendor);
    showVendorCreatedModal(vendor);
  };
}
function showVendorCreatedModal(vendor){
  const cat = catById(vendor.catId);
  openModal(`
    <div class="modal-head"><h3>✅ Вендор создан</h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:6px">${cat.icon} ${vendor.name} · ${cat.name}</p>
    <p style="font-size:12px;color:var(--ink-soft);margin-bottom:12px">Отправьте эти данные вендору — он войдёт в свой кабинет и сам добавит товары:</p>
    <div class="cred-box">
      <div class="cred-row"><span>Логин</span><b>${vendor.login}</b></div>
      <div class="cred-row"><span>Пароль</span><b>${vendor.password}</b></div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="closeModal(); renderAdminScreen();">Готово</button>
  `);
}

renderAuth();
renderHomeGrid();
